; LoRaCore Stress Test — 2 CubeCells
; Device 1: /dev/ttyUSB0 — TX 5s, unconfirmed
; Device 2: /dev/ttyUSB1 — TX 3s, confirmed, payload estendido

[platformio]
default_envs = cubecell1, cubecell2

[common]
platform = heltec-cubecell
board = cubecell_board
framework = arduino
monitor_speed = 115200

[env:cubecell1]
extends = common
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
build_flags =
    -DDEVICE_ID=1
build_src_filter = +<device1.cpp>

[env:cubecell2]
extends = common
upload_port = /dev/ttyUSB1
monitor_port = /dev/ttyUSB1
build_flags =
    -DDEVICE_ID=2
build_src_filter = +<device2.cpp>
