name: Firmware Build

on:
  push:
    branches: [main]
    paths: ['examples/firmware/**']
  pull_request:
    paths: ['examples/firmware/**']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [cubecell-otaa-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ matrix.example }}-${{ hashFiles('examples/firmware/${{ matrix.example }}/*') }}

      - name: Instalar PlatformIO
        run: pip install platformio

      - name: Compilar firmware
        run: cd examples/firmware/${{ matrix.example }} && pio run
