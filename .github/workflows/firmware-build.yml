name: Firmware Build

on:
  push:
    branches: [main]
    paths: ['examples/firmware/**']
  pull_request:
    paths: ['examples/firmware/**']

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [cubecell-otaa-test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ matrix.example }}-${{ hashFiles('examples/firmware/${{ matrix.example }}/*') }}

      - name: Instalar PlatformIO
        run: pip install platformio

      - name: Compilar firmware
        run: cd examples/firmware/${{ matrix.example }} && pio run

      - name: Verificar artefato gerado
        run: |
          BINCOUNT=$(find examples/firmware/${{ matrix.example }}/.pio/build -name 'firmware.*' \( -name '*.bin' -o -name '*.hex' -o -name '*.elf' \) 2>/dev/null | wc -l)
          if [ "$BINCOUNT" -eq 0 ]; then
            echo "::error::Nenhum artefato de firmware encontrado em .pio/build/"
            exit 1
          fi
          echo "Artefato(s) encontrado(s): $BINCOUNT"
          find examples/firmware/${{ matrix.example }}/.pio/build -name 'firmware.*' \( -name '*.bin' -o -name '*.hex' -o -name '*.elf' \) -exec ls -lh {} \;
