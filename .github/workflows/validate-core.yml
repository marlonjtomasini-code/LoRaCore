name: Validate Core

on:
  push:
    branches: [main]
    paths:
      - 'templates/**'
      - 'docs/**'
  pull_request:
    paths:
      - 'templates/**'
      - 'docs/**'

jobs:
  lint-codecs:
    name: Lint Codecs (JavaScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verificar sintaxe dos codecs
        run: |
          errors=0
          for f in templates/codecs/*.js; do
            if ! node --check "$f" 2>&1; then
              echo "ERRO: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "::error::$errors codec(s) com erro de sintaxe"
            exit 1
          fi
          echo "Todos os codecs validados com sucesso"

  test-codecs:
    name: Test Codecs (Node.js assert)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Executar testes de codecs
        run: |
          errors=0
          for f in templates/codecs/tests/test-*.js; do
            echo "--- $f ---"
            if ! node "$f" 2>&1; then
              echo "FALHA: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "::error::$errors teste(s) de codec falharam"
            exit 1
          fi
          echo "Todos os testes de codecs passaram"

  validate-templates:
    name: Validate Templates (JSON/TOML)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Instalar fallback TOML (Python < 3.11)
        run: python3 -c "import tomllib" 2>/dev/null || pip install tomli

      - name: Verificar JSON
        run: |
          errors=0
          for f in $(find templates -name '*.json' -type f); do
            if ! python3 -m json.tool "$f" > /dev/null 2>&1; then
              echo "ERRO JSON invalido: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "::error::$errors arquivo(s) JSON invalido(s)"
            exit 1
          fi
          echo "Todos os JSONs validados"

      - name: Verificar TOML
        run: |
          errors=0
          for f in $(find templates -name '*.toml' -type f); do
            if ! python3 -c "
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib
          with open('$f','rb') as fh:
              tomllib.load(fh)
          " 2>&1; then
              echo "ERRO TOML invalido: $f"
              errors=$((errors + 1))
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "::error::$errors arquivo(s) TOML invalido(s)"
            exit 1
          fi
          echo "Todos os TOMLs validados"

  no-hardcodes:
    name: Detect Hardcoded Values
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Buscar paths hardcoded em docs e templates
        run: |
          # Patterns proibidos (exceto CLAUDE.md que e interno do agente)
          patterns=(
            '/home/[^/]+/'
            '192\.168\.[0-9]+\.[0-9]+'
            '10\.[0-9]+\.[0-9]+\.[0-9]+'
            '172\.(1[6-9]|2[0-9]|3[01])\.[0-9]+\.[0-9]+'
            '[Aa][Pp][Ii][_-]?[Kk][Ee][Yy]\s*[:=]\s*["\x27][A-Za-z0-9]'
            '[Ss][Ee][Cc][Rr][Ee][Tt]\s*[:=]\s*["\x27][A-Za-z0-9]'
          )
          # Arquivos permitidos (nao sao consumidos por projetos externos)
          exclude="--exclude=CLAUDE.md --exclude-dir=.git --exclude-dir=archive --exclude-dir=runbooks"

          errors=0
          for pattern in "${patterns[@]}"; do
            matches=$(grep -rn -E "$pattern" docs/ templates/ $exclude 2>/dev/null || true)
            if [ -n "$matches" ]; then
              echo "::warning::Pattern proibido encontrado: $pattern"
              echo "$matches"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo "::error::Valores hardcoded detectados em docs/ ou templates/. Use placeholders (<USER>, <LORACORE_HOST>, etc.)"
            exit 1
          fi
          echo "Nenhum valor hardcoded encontrado"

  no-unsubstituted-placeholders:
    name: Detect Unsubstituted Placeholders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Buscar placeholders nao substituidos em scripts de deploy
        run: |
          # Detecta <PLACEHOLDER> nao substituidos (exceto em comentarios e docs)
          # Pattern: <WORD> com 2+ chars uppercase, underscores permitidos
          errors=0
          matches=$(grep -rn -E '<[A-Z][A-Z_]{1,}>' scripts/ templates/deploy/ 2>/dev/null \
            | grep -v '^\s*#' \
            | grep -v 'PASTE_YOUR_CODEC' \
            || true)
          if [ -n "$matches" ]; then
            echo "::warning::Placeholders nao substituidos encontrados:"
            echo "$matches"
            errors=$((errors + 1))
          fi

          if [ $errors -gt 0 ]; then
            echo "::error::Placeholders como <USER>, <SECRET>, <TOKEN> encontrados em scripts. Substitua antes do deploy."
            exit 1
          fi
          echo "Nenhum placeholder nao substituido encontrado"
