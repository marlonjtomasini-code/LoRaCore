# Template LoRaCore — Tuning de buffers UDP (4 MB)
# Fonte: docs/DOC_PROTOCOLO_COMUNICACAO_LORAWAN.md, Secao 16.2
# Destino: /etc/sysctl.d/90-lorawan.conf
#
# Previne perda silenciosa de pacotes UDP quando o MQTT Forwarder
# esta momentaneamente ocupado. Default do kernel: 208 KB.

net.core.rmem_default = 4194304
net.core.rmem_max = 4194304
net.core.wmem_default = 4194304
net.core.wmem_max = 4194304

# Durabilidade microSD — reduzir escritas e uso de swap
# Fonte: Stress Test v2 — swap pico 327MB degrada microSD
# RPi5 tem 8GB RAM com baseline ~555MB: ampla margem antes de precisar swap
vm.swappiness = 10
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
