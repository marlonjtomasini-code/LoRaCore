# Template LoRaCore — Logrotate para logs de monitoramento LoRaWAN
# Fonte: TASK-2026-0006 (observabilidade leve)
# Destino: /etc/logrotate.d/lorawan
#
# Rotacao: semanal, 12 semanas retencao, compressao gzip
# Logs cobertos: health, backup, daily report, recovery

/var/log/lorawan-health.log
/var/log/lorawan-backup.log
/var/log/lorawan-daily-report.log
/var/log/lorawan-recovery.log
{
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    create 0644 root root
}
