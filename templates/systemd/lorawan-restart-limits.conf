# Template LoRaCore — Restart throttling para servicos LoRaWAN
# Fonte: Plano de auto-recuperacao para operacao remota
# Destino: /etc/systemd/system/<SERVICO>.service.d/lorawan-restart-limits.conf
#
# Aplicar para: chirpstack, mosquitto, chirpstack-mqtt-forwarder, lora-pkt-fwd
#
# Efeito: limita a 5 restarts em 5 minutos. Apos esgotar, systemd marca o
# servico como "failed" e o auto_recovery.sh assume a escalacao.

[Unit]
StartLimitBurst=5
StartLimitIntervalSec=300

[Service]
Restart=on-failure
RestartSec=5
