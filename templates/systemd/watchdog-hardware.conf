# Template LoRaCore — Hardware watchdog via systemd
# Fonte: Plano de auto-recuperacao para operacao remota
# Destino: /etc/systemd/system.conf.d/watchdog-hardware.conf
#
# RPi5 possui o modulo bcm2835_wdt. Com esta configuracao, systemd PID 1
# pinga o hardware watchdog a cada 15s (metade de RuntimeWatchdogSec=30s).
# Se o kernel ou systemd travar por 30s, o hardware forca um reboot.
# Se o reboot travar por 10 min, forca um power cycle.

[Manager]
RuntimeWatchdogSec=30s
RebootWatchdogSec=10min
WatchdogDevice=/dev/watchdog
