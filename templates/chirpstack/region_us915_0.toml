# Template LoRaCore — Configuracao de Regiao US915 sub-band 1
# Fonte: docs/DOC_PROTOCOLO_COMUNICACAO_LORAWAN.md, Secoes 10.1 e 10.2
# Destino: /etc/chirpstack/region_us915_0.toml
#
# Parametros essenciais (secao [regions.network]):
#   id = "us915_0"
#   common_name = "US915"
#   installation_margin = 10 dB
#   rx_window = 0 (usa RX1 e RX2)
#   rx1_delay = 1s
#   rx1_dr_offset = 0
#   rx2_dr = 8 (SF12/500kHz)
#   rx2_frequency = 923300000 Hz
#   adr_disabled = false
#   min_dr = 0 (SF10/125kHz)
#   max_dr = 5 (SF7/125kHz)
#   enabled_uplink_channels = [0,1,2,3,4,5,6,7,64]

# Topico MQTT do Gateway
[regions.gateway.backend.mqtt]
  topic_prefix = "us915_0"
  share_name = "chirpstack"
  server = "tcp://localhost:1883"
  qos = 1
  clean_session = false
