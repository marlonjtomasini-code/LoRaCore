# Template LoRaCore — Customizacoes de Regiao US915 sub-band 1
# Fonte: docs/DOC_PROTOCOLO_COMUNICACAO_LORAWAN.md, Secoes 10.1 e 10.2
# Destino: aplicar sobre /etc/chirpstack/region_us915_0.toml (default do pacote)
#
# IMPORTANTE: este arquivo NAO substitui o region file inteiro do pacote.
# O ChirpStack v4 instala um region_us915_0.toml completo com ~3000 linhas.
# Sobrescrever com um arquivo parcial causa erro de "duplicate key".
#
# Para customizar, editar diretamente o arquivo do pacote:
#   sudo sed -i '/regions.gateway.backend.mqtt/,/qos/{s/qos = 0/qos = 1/}' \
#       /etc/chirpstack/region_us915_0.toml
#
# Parametros essenciais ja presentes no default do pacote:
#   id = "us915_0"
#   common_name = "US915"
#   topic_prefix = "us915_0"
#   share_name = "chirpstack"
#   server = "tcp://localhost:1883"
#
# Customizacoes aplicadas pelo setup-loracore.sh:
#   qos = 1 (default do pacote: 0)
