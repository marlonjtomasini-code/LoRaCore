# Template LoRaCore — Mosquitto MQTT Broker com autenticacao por senha
# Uso: OPCIONAL — apenas se a rede nao for isolada
# Fonte: SECURITY.md (decisao sobre MQTT ACLs)
# Destino: /etc/mosquitto/conf.d/password_auth.conf
#
# Este template substitui allow_anonymous=true por autenticacao
# baseada em arquivo de senhas. Para redes isoladas (chao de fabrica
# sem internet), o production.conf com allow_anonymous=true e suficiente.
#
# Setup:
#   1. Criar arquivo de senhas:
#      sudo mosquitto_passwd -c /etc/mosquitto/passwd chirpstack
#      sudo mosquitto_passwd -b /etc/mosquitto/passwd mqtt_forwarder <SENHA>
#      sudo mosquitto_passwd -b /etc/mosquitto/passwd integrador <SENHA>
#
#   2. Copiar este arquivo:
#      sudo cp password_auth.conf /etc/mosquitto/conf.d/
#
#   3. Remover production.conf (que tem allow_anonymous true):
#      sudo rm /etc/mosquitto/conf.d/production.conf
#
#   4. Reiniciar Mosquitto:
#      sudo systemctl restart mosquitto
#
#   5. Atualizar credenciais nos clientes:
#      - chirpstack.toml: [integration.mqtt] user/password
#      - chirpstack-mqtt-forwarder.toml: [mqtt] user/password
#      - Scripts de monitoramento: mosquitto_sub -u <USER> -P <SENHA>
#
# Substituir:
#   <PASSWORD_FILE> — path do arquivo de senhas (ex: /etc/mosquitto/passwd)

# Desabilitar acesso anonimo
allow_anonymous false

# Arquivo de senhas (criado com mosquitto_passwd)
password_file <PASSWORD_FILE>

# Conexoes e filas (identico ao production.conf)
max_connections 200
max_queued_messages 5000
max_inflight_messages 40
autosave_interval 300
